<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM from Scratch — Progress Checklist</title>
<style>
  :root {
    --bg: #0e1117;
    --panel: #161b22;
    --panel-2: #1c2330;
    --border: #2a313c;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #6ea8fe;
    --accent-2: #a371f7;
    --done: #3fb950;
    --done-bg: rgba(63,185,80,0.12);
    --bar-bg: #21262d;
    --shadow: 0 1px 3px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--accent); }

  /* ---- Header ---- */
  header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(14,17,23,0.85);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 18px 24px 14px;
  }
  .title-row {
    display: flex;
    align-items: baseline;
    gap: 12px;
    flex-wrap: wrap;
  }
  h1 {
    font-size: 1.35rem;
    margin: 0;
    letter-spacing: -0.02em;
  }
  .subtitle { color: var(--muted); font-size: 0.85rem; }
  .overall {
    margin-top: 12px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  .bar {
    flex: 1;
    min-width: 200px;
    height: 10px;
    background: var(--bar-bg);
    border-radius: 999px;
    overflow: hidden;
  }
  .bar > span {
    display: block;
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    border-radius: 999px;
    transition: width 0.35s ease;
  }
  .overall-stats { font-variant-numeric: tabular-nums; font-size: 0.9rem; color: var(--muted); white-space: nowrap; }
  .overall-stats strong { color: var(--text); }

  .controls {
    margin-top: 12px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .controls input[type=search] {
    flex: 1;
    min-width: 160px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 12px;
    border-radius: 8px;
    font-size: 0.85rem;
  }
  button.ctl {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 7px 12px;
    border-radius: 8px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  button.ctl:hover { color: var(--text); border-color: var(--accent); }

  /* ---- Layout ---- */
  main { max-width: 1100px; margin: 0 auto; padding: 24px; }

  .phase {
    margin-bottom: 26px;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    background: var(--panel);
  }
  .phase-head {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
    background: var(--panel-2);
  }
  .phase-head:hover { background: #222a38; }
  .phase-name { font-weight: 600; font-size: 1.02rem; flex: 1; letter-spacing: -0.01em; }
  .phase-count { font-size: 0.8rem; color: var(--muted); font-variant-numeric: tabular-nums; }
  .phase-mini-bar {
    width: 90px; height: 6px; background: var(--bar-bg); border-radius: 999px; overflow: hidden;
  }
  .phase-mini-bar > span { display: block; height: 100%; width: 0; background: var(--done); transition: width 0.3s; }
  .chevron { color: var(--muted); transition: transform 0.2s; font-size: 0.8rem; }
  .phase.collapsed .chevron { transform: rotate(-90deg); }
  .phase.collapsed .phase-body { display: none; }

  .phase-body { padding: 8px 14px 14px; }

  /* ---- Day card ---- */
  .day {
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-top: 10px;
    background: var(--panel);
    transition: border-color 0.2s;
  }
  .day.day-done { border-color: var(--done); background: var(--done-bg); }
  .day-head {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 14px;
  }
  .day-check { margin-top: 3px; }
  .day-info { flex: 1; min-width: 0; }
  .day-title { font-weight: 600; font-size: 0.96rem; }
  .day-meta { color: var(--muted); font-size: 0.78rem; margin-top: 2px; }
  .day-badge {
    font-size: 0.7rem; font-weight: 600; padding: 2px 8px; border-radius: 999px;
    background: rgba(110,168,254,0.15); color: var(--accent); white-space: nowrap;
  }
  .expand-btn {
    background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.78rem; padding: 4px;
  }
  .expand-btn:hover { color: var(--text); }

  .day-details { display: none; padding: 0 14px 14px 44px; }
  .day.open .day-details { display: block; }

  .subtasks { display: flex; flex-direction: column; gap: 6px; margin: 4px 0 12px; }
  .subtask { display: flex; align-items: center; gap: 9px; font-size: 0.85rem; }
  .subtask label { cursor: pointer; }
  .subtask input:checked + label { color: var(--muted); text-decoration: line-through; }

  .detail-block { font-size: 0.82rem; margin-top: 10px; }
  .detail-block h4 {
    margin: 0 0 4px; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--accent-2);
  }
  .detail-block ul { margin: 0; padding-left: 18px; color: var(--muted); }
  .detail-block p { margin: 0; color: var(--muted); }
  .tools { color: var(--muted); }

  /* checkbox styling */
  input[type=checkbox] {
    appearance: none; -webkit-appearance: none;
    width: 18px; height: 18px; border: 1.5px solid var(--border);
    border-radius: 5px; background: var(--panel-2); cursor: pointer;
    position: relative; flex-shrink: 0; transition: all 0.15s;
  }
  input[type=checkbox]:hover { border-color: var(--accent); }
  input[type=checkbox]:checked { background: var(--done); border-color: var(--done); }
  input[type=checkbox]:checked::after {
    content: ""; position: absolute; left: 5px; top: 1px;
    width: 5px; height: 10px; border: solid #0e1117; border-width: 0 2px 2px 0; transform: rotate(45deg);
  }
  .day-check input[type=checkbox] { width: 20px; height: 20px; }

  .hidden { display: none !important; }
  footer { text-align: center; color: var(--muted); font-size: 0.78rem; padding: 20px; }
</style>
</head>

</header>

/* ---------- State ---------- */
const STORE_KEY = "llm-roadmap-progress-v1";
let state = JSON.parse(localStorage.getItem(STORE_KEY) || "{}");
function save() { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
function dayState(n) { return state[n] || (state[n] = {sub:{}}); }

function isDayDone(n) {
  const s = state[n];
  if (!s) return false;
  return SUBTASKS.every((_, i) => s.sub && s.sub[i]);
}

/* ---------- Render ---------- */
const root = document.getElementById("root");
const phases = [];
DAYS.forEach(d => { if (!phases.includes(d.phase)) phases.push(d.phase); });

phases.forEach((phase, pi) => {
  const days = DAYS.filter(d => d.phase === phase);
  const sec = document.createElement("section");
  sec.className = "phase";
  sec.dataset.phase = phase;

  const head = document.createElement("div");
  head.className = "phase-head";
  head.innerHTML = `
    <span class="chevron">▼</span>
    <span class="phase-name">${pi+1}. ${phase}</span>
    <div class="phase-mini-bar"><span></span></div>
    <span class="phase-count"></span>`;
  head.addEventListener("click", e => {
    if (e.target.tagName === "INPUT") return;
    sec.classList.toggle("collapsed");
  });
  sec.appendChild(head);

  const body = document.createElement("div");
  body.className = "phase-body";

  days.forEach(d => {
    const ds = dayState(d.n);
    const card = document.createElement("div");
    card.className = "day";
    card.dataset.n = d.n;
    const searchText = (d.title + " " + d.phase + " " + d.papers.join(" ") + " " + d.work + " " + d.tools).toLowerCase();
    card.dataset.search = searchText;

    card.innerHTML = `
      <div class="day-head">
        <div class="day-check"><input type="checkbox" class="dayDone" title="Mark whole day done"></div>
        <div class="day-info">
          <div class="day-title">Day ${d.n}: ${d.title}</div>
          <div class="day-meta">${d.date}</div>
        </div>
        <span class="day-badge">${d.phase}</span>
        <button class="expand-btn">details ▾</button>
      </div>
      <div class="day-details">
        <div class="subtasks"></div>
        <div class="detail-block">
          <h4>Core papers</h4>
          <ul>${d.papers.map(p=>`<li>${p}</li>`).join("")}</ul>
        </div>
        <div class="detail-block">
          <h4>Reproducible work</h4>
          <p>${d.work}</p>
        </div>
        <div class="detail-block">
          <h4>Data & tools</h4>
          <p class="tools">${d.tools}</p>
        </div>
      </div>`;

    // subtasks
    const subWrap = card.querySelector(".subtasks");
    SUBTASKS.forEach((label, i) => {
      const id = `d${d.n}s${i}`;
      const row = document.createElement("div");
      row.className = "subtask";
      const cb = document.createElement("input");
      cb.type = "checkbox"; cb.id = id;
      cb.checked = !!(ds.sub && ds.sub[i]);
      cb.addEventListener("change", () => {
        dayState(d.n).sub[i] = cb.checked;
        save(); syncDay(d.n); updateAll();
      });
      const lab = document.createElement("label");
      lab.setAttribute("for", id); lab.textContent = label;
      row.appendChild(cb); row.appendChild(lab);
      subWrap.appendChild(row);
    });

    // whole-day checkbox
    const dayCb = card.querySelector(".dayDone");
    dayCb.addEventListener("change", () => {
      const s = dayState(d.n);
      SUBTASKS.forEach((_, i) => s.sub[i] = dayCb.checked);
      save();
      card.querySelectorAll(".subtask input").forEach((c,i)=>c.checked = dayCb.checked);
      syncDay(d.n); updateAll();
    });

    // expand
    card.querySelector(".expand-btn").addEventListener("click", () => {
      card.classList.toggle("open");
      card.querySelector(".expand-btn").textContent = card.classList.contains("open") ? "details ▴" : "details ▾";
    });

    body.appendChild(card);
  });

  sec.appendChild(body);
  root.appendChild(sec);
});

function syncDay(n) {
  const card = root.querySelector(`.day[data-n="${n}"]`);
  const done = isDayDone(n);
  card.classList.toggle("day-done", done);
  card.querySelector(".dayDone").checked = done;
}

function updateAll() {
  let done = 0;
  DAYS.forEach(d => { if (isDayDone(d.n)) done++; });
  const pct = Math.round(done / DAYS.length * 100);
  document.getElementById("doneCount").textContent = done;
  document.getElementById("totalCount").textContent = DAYS.length;
  document.getElementById("pct").textContent = pct + "%";
  document.getElementById("overallBar").style.width = pct + "%";

  // per-phase
  document.querySelectorAll(".phase").forEach(sec => {
    const days = DAYS.filter(d => d.phase === sec.dataset.phase);
    const pdone = days.filter(d => isDayDone(d.n)).length;
    sec.querySelector(".phase-count").textContent = `${pdone}/${days.length}`;
    sec.querySelector(".phase-mini-bar > span").style.width = (pdone/days.length*100) + "%";
  });
}

/* ---------- Controls ---------- */
let todoOnly = false;
const search = document.getElementById("search");

function applyFilter() {
  const q = search.value.trim().toLowerCase();
  document.querySelectorAll(".day").forEach(card => {
    const matchSearch = !q || card.dataset.search.includes(q);
    const matchTodo = !todoOnly || !isDayDone(+card.dataset.n);
    card.classList.toggle("hidden", !(matchSearch && matchTodo));
  });
  // hide empty phases
  document.querySelectorAll(".phase").forEach(sec => {
    const anyVisible = [...sec.querySelectorAll(".day")].some(c => !c.classList.contains("hidden"));
    sec.classList.toggle("hidden", !anyVisible);
  });
}

search.addEventListener("input", applyFilter);
document.getElementById("filterTodo").addEventListener("click", e => {
  todoOnly = !todoOnly;
  e.target.style.color = todoOnly ? "var(--accent)" : "";
  e.target.style.borderColor = todoOnly ? "var(--accent)" : "";
  e.target.textContent = todoOnly ? "Showing to-do" : "Show only to-do";
  applyFilter();
});
document.getElementById("expandAll").addEventListener("click", () => {
  document.querySelectorAll(".phase").forEach(s=>s.classList.remove("collapsed"));
  document.querySelectorAll(".day").forEach(c=>{c.classList.add("open"); c.querySelector(".expand-btn").textContent="details ▴";});
});
document.getElementById("collapseAll").addEventListener("click", () => {
  document.querySelectorAll(".day").forEach(c=>{c.classList.remove("open"); c.querySelector(".expand-btn").textContent="details ▾";});
});
document.getElementById("resetBtn").addEventListener("click", () => {
  if (confirm("Reset all progress? This clears every checkbox.")) {
    state = {}; save();
    document.querySelectorAll("input[type=checkbox]").forEach(c=>c.checked=false);
    DAYS.forEach(d=>syncDay(d.n));
    updateAll();
  }
});

/* ---------- Init ---------- */
DAYS.forEach(d => syncDay(d.n));
updateAll();
</script>
